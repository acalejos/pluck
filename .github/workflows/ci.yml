name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify generated docs are in sync with the HTML
        run: |
          npm run docs
          if ! git diff --quiet -- site/; then
            echo "::error::site/*.md or llms*.txt are stale — run \`npm run docs\` and commit."
            git --no-pager diff --stat -- site/
            exit 1
          fi
